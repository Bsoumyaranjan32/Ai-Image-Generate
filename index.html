<!DOCTYPE html>
<html lang="en">
<head>
    <!--
        Head: includes meta tags, title and third-party libraries used by the UI.
        - Tailwind (for styling)
        - Lucide (icon library)
        - Font Awesome (dice icon)
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Image Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/lucide@latest"></script>

        <style>
            /* Lightweight light-theme overrides (use html.light to avoid accidental class collisions) */
            html.light body { background-color: #f8fafc !important; color: #0f172a !important; }
            html.light header { background-color: #f1f5f9 !important; border-color: #e2e8f0 !important; }
            /* Classes with square brackets must be escaped in CSS; use attribute selectors instead */
            html.light [class~="bg-[#121420]"], html.light [class~="bg-[#1a1d2e]"] { background-color: #ffffff !important; }
            html.light textarea, html.light select, html.light button { background-color: #ffffff !important; color: #0f172a !important; border-color: #cbd5e1 !important; }
            html.light .text-gray-200 { color: #0f172a !important; }
            html.light .text-gray-300 { color: #334155 !important; }
            html.light .text-gray-400 { color: #475569 !important; }
            html.light .text-gray-500 { color: #64748b !important; }
            html.light .border-gray-800, html.light .border-gray-700 { border-color: #e2e8f0 !important; }
            html.light .bg-gray-800 { background-color: #eef2ff !important; color: #0f172a !important; }
            html.light [class~="min-h-[450px]"] { background-color: rgba(255,255,255,0.9) !important; }

            /* Make image-count badge readable in light theme */
            html.light span.bg-gray-800.text-gray-400 { color: #0f172a !important; background-color: #e2e8f0 !important; }

            /* Theme toggle: styles for both states */
            #theme-toggle { transition: background-color .15s, color .15s, border-color .15s; }
            html:not(.light) #theme-toggle { background-color: #111827; color: #cbd5e1; border-color: #374151; }
            html.light #theme-toggle { background-color: #ffffff; color: #0f172a; border-color: #cbd5e1; box-shadow: 0 1px 2px rgba(15,23,42,0.04); }
            html.light #theme-toggle:hover { background-color: #f1f5f9; }

            /* Ensure text gradients and white text switch to readable dark color in light theme */
            html.light .text-white { color: #0f172a !important; }
            html.light .text-transparent.bg-clip-text { background: none !important; color: #0f172a !important; -webkit-text-fill-color: #0f172a !important; }

            /* Placeholder color for inputs in light theme */
            html.light ::placeholder { color: #94a3b8 !important; opacity: 1; }
        </style>
</head>
<body class="bg-[#0b0c10] text-gray-200 font-sans min-h-screen flex flex-col">

    <!-- Primary header: app title and top controls (history, theme) -->
    <header class="border-b border-gray-800 bg-[#0f111a] px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <i data-lucide="sparkles" class="text-blue-500 w-6 h-6 animate-pulse"></i>
            <span class="text-xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r content-box from-blue-400 to-indigo-500">
                Ai Image Generate
            </span>
        </div>
        <div class="flex items-center space-x-4">
            <button class="flex items-center space-x-1.5 bg-gray-800 hover:bg-gray-700 text-sm px-4 py-2 rounded-lg transition border border-gray-700">
                <i data-lucide="history" class="w-4 h-4"></i>
                <span>History</span>
            </button>
            <button id="theme-toggle" class="p-2 rounded-lg transition border border-gray-700 text-gray-400 hover:text-white flex items-center justify-center" aria-label="Toggle theme" title="Toggle theme" aria-pressed="false">
                <i data-lucide="moon" class="w-5 h-5" aria-hidden="true"></i>
                <span class="sr-only">Toggle theme</span>
            </button>
        </div>
    </header>

    <!-- Main content: prompt controls (left) and generated images gallery (right) -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-6 md:p-10 flex flex-col">
        
        <div class="text-center my-8">
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 mb-4">
                Text to Image Studio
            </h1>
            <p class="text-gray-400 text-sm md:text-base max-w-xl mx-auto">
                Describe your idea and watch AI craft stunning, high-quality images.
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start mt-4">
            
            <!-- Left sidebar: prompt input, model/ratio/count selectors and Generate button -->
            <section class="lg:col-span-4 bg-[#121420] border border-gray-800 rounded-2xl p-6 space-y-6 shadow-xl">
                
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-300">Prompt</label>
                    <div class="relative">
                        <textarea 
                            rows="4" 
                            placeholder="Describe your image in detail..." 
                            class="w-full bg-[#1a1d2e] border border-gray-700 rounded-xl p-4 pr-12 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none transition"
                        >
                        </textarea>

                        <!-- Dice button inside textarea (inserts a sample prompt) -->
                        <button id="dice-btn" type="button" class="absolute right-3 bottom-5 w-9 h-9 flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg border border-violet-500/40">
                            <i class="fa-solid fa-dice"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-300">
                        Select Model
                    </label>

                <div class="relative">
        <select
            class="w-full bg-[#1a1d2e] border border-gray-700 rounded-xl p-3.5 text-sm text-white appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        >
            <option value="" selected disabled>Select Model</option>
            <option value="flux">FLUX AI</option>
            <option value="sdxl">Stable Diffusion XL</option>
            <option value="dalle3">DALL·E 3</option>
            <option value="midjourney">Midjourney Style</option>
            <option value="realistic">Realistic Vision</option>
            <option value="anime">Anime Generator</option>
        </select>

        <!-- Arrow Icon -->
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
            <i data-lucide="chevron-down" class="w-4 h-4"></i>
        </div>
    </div>
</div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-300">
                        Image Count
                    </label>

                    <div class="relative">
                        <select class="w-full bg-[#1a1d2e] border border-gray-700 rounded-xl p-3.5 text-sm text-white appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                            <option value="" selected disabled>Image Count</option>
                            <option value="1">1 Image</option>
                            <option value="2">2 Images</option>
                            <option value="4">4 Images</option>
                            <option value="6">6 Images</option>
                            <option value="8">8 Images</option>
                        </select>

                        <!-- Arrow Icon -->
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-300">Aspect Ratio</label>
                    <div class="relative">
                        <select class="w-full bg-[#1a1d2e] border border-gray-700 rounded-xl p-3.5 text-sm text-white appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                            <option value="" selected disabled>Aspect Ratio</option>
                            <option value="1:1">Square (1:1)</option>
                            <option value="16:9">Landscape (16:9)</option>
                            <option value="9:16">Portrait (9:16)</option>
                            <option value="4:3">Standard (4:3)</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>

                <!-- <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-400 flex items-center justify-between">
                        <span>Negative Prompt</span>
                        <span class="text-xs text-gray-600">(Optional)</span>
                    </label>
                    <input 
                        type="text" 
                        placeholder="Blurry, low quality, distorted..." 
                        class="w-full bg-[#1a1d2e] border border-gray-700 rounded-xl p-3.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    />
                </div> -->

                <!-- Generate button: starts the image fetch flow -->
                <button class="w-full mt-2 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all transform active:scale-[0.98] flex items-center justify-center space-x-2">
                    <i data-lucide="wand-2" class="w-5 h-5"></i>
                    <span>Generate Image</span>
                </button>

            </section>

            <!-- Right content: generated images gallery and controls -->
            <section class="lg:col-span-8 flex flex-col h-full">
                
                <div class="flex items-center justify-between mb-4 px-2">
                    <h2 class="text-xl font-semibold tracking-wide text-gray-200">Generated Images</h2>
                    <div class="flex items-center space-x-4">
                        <span class="text-xs bg-gray-800 text-gray-400 px-2.5 py-1 rounded-full border border-gray-700">0 images</span>
                        <button class="text-xs text-gray-500 hover:text-red-400 transition font-medium">Clear all</button>
                    </div>
                </div>

                <!-- Gallery container: images appear here (empty state shown by default) -->
                <div class="flex-1 min-h-[450px] bg-[#121420]/50 border border-dashed border-gray-800 rounded-2xl flex flex-col items-center justify-center p-8 text-center backdrop-blur-sm">
                    <div class="w-16 h-16 bg-[#1a1d2e] rounded-2xl border border-gray-700 flex items-center justify-center mb-4 shadow-inner text-gray-500">
                        <i data-lucide="image" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-base font-medium text-gray-300 mb-1">Generated images will appear here</h3>
                    <p class="text-xs text-gray-500 max-w-xs">Enter a prompt on the left sidebar and click Generate to begin your creation.</p>
                </div>

            </section>
        </div>
    </main>

    <!-- Footer: small copyright / credits -->
    <!-- <footer class="py-6 text-center text-xs text-gray-600 border-t border-gray-900 bg-[#090a0f] mt-12">
        &copy; 2026 Text to Image Studio. Powered by Tailwind CSS.
    </footer> -->

    <script>
        <!-- Initialize Lucide icons used in the page -->
        lucide.createIcons();
    </script>

    <script src="main.js"></script>
</body>
</html>
